name: Automated Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  # Determine if release is needed
  version-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for [release] commit marker
        id: check
        run: |
          if git log -1 --pretty=%B | grep -q '\[release\]'; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            # Auto-increment patch version
            current=$(cat package.json | grep '"version"' | cut -d'"' -f4)
            major=$(echo $current | cut -d. -f1)
            minor=$(echo $current | cut -d. -f2)
            patch=$(echo $current | cut -d. -f3)
            new_patch=$((patch + 1))
            echo "new_version=${major}.${minor}.${new_patch}" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # Build all platforms
  build:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-intel
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libssl-dev pkg-config
      
      - name: Install WebView2 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "webview2.exe"
          Start-Process -FilePath "webview2.exe" -ArgumentList "/silent", "/install" -Wait
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/appimage/*.AppImage

  # Create release
  release:
    needs: [version-check, build]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Update version
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ needs.version-check.outputs.new_version }}"/g' package.json
          sed -i 's/"version": "[^"]*"/"version": "${{ needs.version-check.outputs.new_version }}"/g' src-tauri/tauri.conf.json
      
      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ needs.version-check.outputs.new_version }} [skip ci]

Co-authored-by: Qwen-Coder <qwen-coder@alibabacloud.com>"
          git push
      
      - name: Create tag
        run: |
          git tag v${{ needs.version-check.outputs.new_version }}
          git push origin v${{ needs.version-check.outputs.new_version }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version-check.outputs.new_version }}
          name: Dora v${{ needs.version-check.outputs.new_version }}
          generate_release_notes: true
          files: |
            artifacts/macos-intel/**/*.dmg
            artifacts/macos-intel/**/*.app
            artifacts/macos-arm/**/*.dmg
            artifacts/macos-arm/**/*.app
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
