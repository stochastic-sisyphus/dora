<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #16130f;
      color: #a39a90;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: #2c2620;
      border-bottom: 1px solid #433b32;
      flex-shrink: 0;
    }

    .url-input {
      flex: 1;
      background: #16130f;
      border: 1px solid #433b32;
      border-radius: 4px;
      padding: 5px 10px;
      color: #beb6ae;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
    }

    .url-input:focus {
      border-color: #69AAB2;
    }

    .url-input::placeholder {
      color: #5a5047;
    }

    .btn {
      background: #433b32;
      border: none;
      border-radius: 4px;
      padding: 5px 10px;
      color: #a39a90;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { background: #5a5047; }
    .btn.active { background: #69AAB2; color: #16130f; }

    .shortcuts {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      background: #2c2620;
      border-bottom: 1px solid #433b32;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .shortcut {
      background: #16130f;
      border: 1px solid #433b32;
      border-radius: 3px;
      padding: 3px 8px;
      color: #8a8075;
      font-size: 0.7rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .shortcut:hover { border-color: #69AAB2; color: #69AAB2; }

    .frame-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #16130f;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 2rem;
    }

    .splash h1 {
      color: #beb6ae;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .splash p {
      font-size: 0.8rem;
      color: #5a5047;
      max-width: 280px;
      line-height: 1.5;
    }

    .splash kbd {
      background: #2c2620;
      border: 1px solid #433b32;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.75rem;
      color: #69AAB2;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input class="url-input" id="url" type="text" placeholder="Enter URL or search..." spellcheck="false">
    <button class="btn" onclick="go()">Go</button>
  </div>
  <div class="shortcuts" id="shortcuts">
    <span class="shortcut" data-url="https://search.schrodingers.lol">SearXNG</span>
    <span class="shortcut" data-url="https://chat.schrodingers.lol">Open WebUI</span>
    <span class="shortcut" data-url="https://wind.schrodingers.lol">Windmill</span>
    <span class="shortcut" data-url="https://github.com/stochastic-sisyphus">GitHub</span>
  </div>
  <div class="frame-container" id="frame-container">
    <div class="splash" id="splash">
      <h1>Research View</h1>
      <p>Type a URL above or pick a shortcut. Use alongside chat for side-by-side research.</p>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const container = document.getElementById('frame-container');
    const splash = document.getElementById('splash');

    function go() {
      let url = urlInput.value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      loadUrl(url);
    }

    function loadUrl(url) {
      urlInput.value = url;
      if (splash) splash.remove();
      let iframe = document.querySelector('iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox');
        container.appendChild(iframe);
      }
      iframe.src = url;
    }

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') go();
    });

    document.querySelectorAll('.shortcut').forEach(el => {
      el.addEventListener('click', () => loadUrl(el.dataset.url));
    });
  </script>
</body>
</html>
