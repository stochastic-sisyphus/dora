<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #16130f;
      color: #a39a90;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }

    h1 {
      color: #beb6ae;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #69AAB2;
      margin: 0 auto 1rem;
      border-radius: 1px;
    }

    p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #8a8075;
    }

    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.25rem 0.75rem;
      background: #2c2620;
      border: 1px solid #433b32;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #69AAB2;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Research View</h1>
    <div class="divider"></div>
    <p>Observable framework and search results will render here. This pane connects to the research workspace.</p>
    <span class="badge">awaiting connection</span>
  </div>
</body>
</html>
